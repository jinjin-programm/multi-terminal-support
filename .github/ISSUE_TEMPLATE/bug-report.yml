name: Bug report
description: Report a reproducible Multi-Terminal problem
title: "[Bug]: "
labels: [bug]
body:
  - type: dropdown
    id: product
    attributes:
      label: Product
      options:
        - Direct
        - App Store
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Multi-Terminal version
      placeholder: For example, 1.0.2
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Remove secrets, tokens, private paths, and private terminal output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, tokens, private file paths, and sensitive terminal output.
          required: true
